name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: libcall
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: libcall
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: libcall
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: libcall
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: libcall.exe
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: ${{ matrix.target }}
    
    - name: Install cross-compilation tools (Linux ARM64)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
    
    - name: Configure cross-compilation (Linux ARM64)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
    
    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Strip binary (Linux ARM64)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
    
    - name: Strip binary (Unix host targets)
      if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-gnu'
      run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - name: Prepare release asset (Unix)
      if: runner.os != 'Windows'
      run: |
        package_name="libcall-${{ github.ref_name }}-${{ matrix.target }}"
        mkdir -p "dist/$package_name"
        cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} "dist/$package_name/"
        cp README.md LICENSE "dist/$package_name/"
        tar -C dist -czf "dist/$package_name.tar.gz" "$package_name"

    - name: Prepare release asset (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $packageName = "libcall-${{ github.ref_name }}-${{ matrix.target }}"
        New-Item -ItemType Directory -Force "dist/$packageName"
        Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/$packageName/"
        Copy-Item README.md, LICENSE "dist/$packageName/"
        Compress-Archive -Path "dist/$packageName" -DestinationPath "dist/$packageName.zip" -Force
    
    - name: Upload release asset
      uses: actions/upload-artifact@v7
      with:
        name: libcall-${{ github.ref_name }}-${{ matrix.target }}
        path: dist/libcall-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/*/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
